<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bomberman 4 — Marcador</title>
<style>
  :root {
    --bg:    #0f1117;
    --card:  #1a1d27;
    --bord:  #2a2d3a;
    --gold:  #f5a623;
    --green: #00c853;
    --red:   #ff3d57;
    --blue:  #2979ff;
    --text:  #e8eaf0;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 28px 16px;
  }
  header { text-align: center; margin-bottom: 36px; }
  header h1 {
    font-size: 2.1rem; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(90deg,#f5a623,#ff6b35,#f5a623);
    background-size: 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 5px; }
  .dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--green); border-radius: 50%; margin-right: 6px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
    gap: 16px; max-width: 1100px; margin: 0 auto;
  }

  /* Colores por personaje */
  .color-Blanco { --accent: #e8eaf0; --glow: rgba(232,234,240,.25); }
  .color-Negro  { --accent: #9e9e9e; --glow: rgba(158,158,158,.20); }
  .color-Rojo   { --accent: #ff3d57; --glow: rgba(255,61,87,.25); }
  .color-Azul   { --accent: #2979ff; --glow: rgba(41,121,255,.25); }
  .color-Verde  { --accent: #00c853; --glow: rgba(0,200,83,.25); }

  .card {
    background: var(--card);
    border: 2px solid var(--bord);
    border-radius: 18px;
    padding: 20px 16px 16px;
    position: relative;
    transition: transform .2s, box-shadow .2s;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 10px 36px rgba(0,0,0,.55); }
  .card.leader {
    border-color: var(--accent, var(--gold));
    box-shadow: 0 0 28px var(--glow, rgba(245,166,35,.28));
  }

  .color-dot {
    width: 12px; height: 12px; border-radius: 50%;
    display: inline-block; margin-right: 7px; vertical-align: middle;
    background: var(--accent, var(--gold));
  }
  .color-Blanco .color-dot { background: #e8eaf0; border: 1px solid #555; }
  .color-Negro  .color-dot { background: #555; }
  .color-Rojo   .color-dot { background: #ff3d57; }
  .color-Azul   .color-dot { background: #2979ff; }
  .color-Verde  .color-dot { background: #00c853; }

  .rank {
    position: absolute; top: 14px; right: 14px;
    font-size: .68rem; font-weight: 700;
    padding: 2px 9px; border-radius: 99px;
    background: var(--bord); color: var(--muted);
  }
  .card.leader .rank {
    background: var(--accent, var(--gold));
    color: #000;
  }

  .pname { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
  .pcolor { font-size: .72rem; color: var(--muted); margin-bottom: 14px; }

  .prog-label {
    display: flex; justify-content: space-between;
    font-size: .72rem; color: var(--muted); margin-bottom: 5px;
  }
  .track {
    background: var(--bord); border-radius: 99px;
    height: 7px; overflow: hidden; margin-bottom: 14px;
  }
  .fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent, var(--blue)), var(--gold));
    transition: width .7s ease;
  }

  .crowns { display: flex; gap: 4px; margin-bottom: 18px; }
  .cr { font-size: 1.2rem; filter: grayscale(1) opacity(.2); transition: filter .4s; }
  .cr.on { filter: none; }

  .odds-box {
    background: var(--bg);
    border-radius: 12px;
    padding: 11px 13px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .odds-lbl { font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }
  .odds-val  { font-size: 1.7rem; font-weight: 900; color: var(--gold); }
  .odds-chg  { font-size: .70rem; font-weight: 700; margin-top: 2px; }
  .up   { color: var(--red); }
  .dn   { color: var(--green); }
  .flat { color: var(--muted); }

  footer { text-align: center; margin-top: 32px; color: var(--muted); font-size: .74rem; }

  .reset-btn {
    display: block;
    margin: 24px auto 0;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--bord);
    color: var(--muted);
    border-radius: 99px;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all .2s;
  }
  .reset-btn:hover {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
</style>
</head>
<body>

<header>
  <h1>💣 BOMBERMAN 4</h1>
  <p><span class="dot"></span>En vivo · Firebase Realtime</p>
</header>

<div class="grid" id="grid"></div>
<button class="reset-btn" id="resetBtn">RESET TODO</button>
<footer id="ft">Conectando…</footer>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, get, set }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const app = initializeApp({
    databaseURL: "https://bomber-3a196-default-rtdb.firebaseio.com"
  });
  const db = getDatabase(app);

  const WIN_GOAL = 5;
  let prevOdds = {};

  function render(scores) {
    if (!scores) {
      document.getElementById('ft').textContent = "Sin datos — inicia el detector.";
      return;
    }

    const ids   = Object.keys(scores).sort((a, b) => +a - +b);
    const byPts = [...ids].sort((a, b) => scores[b].points - scores[a].points);
    const leader = scores[byPts[0]].points > 0 ? byPts[0] : null;
    const grid  = document.getElementById('grid');
    grid.innerHTML = '';

    for (const id of ids) {
      const { name, points, color } = scores[id];
      const odd   = scores[id].odds ?? 1.01;
      const prev  = prevOdds[id];
      const rank  = byPts.indexOf(id) + 1;
      const isL   = leader === id;
      const col   = color || 'Blanco';

      let chgTxt = '—', chgCls = 'flat';
      if (prev !== undefined && Math.abs(odd - prev) > 0.005) {
        if (odd < prev) { chgTxt = `▼ ${(prev - odd).toFixed(2)}`; chgCls = 'dn'; }
        else            { chgTxt = `▲ ${(odd - prev).toFixed(2)}`; chgCls = 'up'; }
      }

      const crs = Array.from({length: WIN_GOAL}, (_, i) =>
        `<span class="cr ${i < points ? 'on' : ''}">👑</span>`).join('');
      const pct = Math.min(100, (points / WIN_GOAL) * 100);

      grid.innerHTML += `
        <div class="card color-${col} ${isL ? 'leader' : ''}">
          <div class="rank">#${rank}</div>
          <div class="pname"><span class="color-dot"></span>${name}</div>
          <div class="pcolor">${col}</div>
          <div class="prog-label"><span>${points} pts</span><span>Meta: ${WIN_GOAL}</span></div>
          <div class="track"><div class="fill" style="width:${pct}%"></div></div>
          <div class="crowns">${crs}</div>
          <div class="odds-box">
            <div>
              <div class="odds-lbl">Cuota</div>
              <div class="odds-chg ${chgCls}">${chgTxt}</div>
            </div>
            <div class="odds-val">${odd.toFixed(2)}x</div>
          </div>
        </div>`;
    }

    for (const id in scores) prevOdds[id] = scores[id].odds;
    document.getElementById('ft').textContent =
      `Última actualización: ${new Date().toLocaleTimeString('es')}`;
  }

  onValue(ref(db, "scores"), snap => render(snap.val()));

  // ── Boton de reset ─────────────────────────────────────────────────────
  document.getElementById('resetBtn').addEventListener('click', async () => {
    if (!confirm("Resetear TODOS los puntajes a 0?")) return;
    try {
      const snap    = await get(ref(db, "scores"));
      const current = snap.val() || {};
      const reset   = {};
      // Cuotas iniciales del modelo (K=0.5)
      const CUOTAS  = [2.38, 3.17, 6.35, 9.52, 19.05];
      for (let i = 1; i <= 5; i++) {
        const id  = String(i);
        const cur = current[id] || {};
        reset[id] = {
          name:    cur.name  || `Jugador${i}`,
          color:   cur.color || "?",
          points:  0,
          odds:    cur.odds  || CUOTAS[i - 1],
          history: []
        };
      }
      await set(ref(db, "scores"), reset);
      prevOdds = {};
    } catch (e) {
      alert("Error: " + e.message);
    }
  });
</script>
</body>
</html>
